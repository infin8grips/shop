<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Infin8Grips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Page Breath/Glow */
        @keyframes subtleBreathe {
            0%, 100% { opacity: 0.98; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.01); }
        }

        /* 1. Breathing for the main thank you text */
        .text-breathe {
            animation: subtleBreathe 5s ease-in-out infinite;
        }

        /* 2. Shimmer Animation (Moving Gradient Shine) for the code */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* 3. Glow Animation (Outer Shine) for the code box */
        @keyframes codeGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.05), inset 0 0 2px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), inset 0 0 5px rgba(255, 255, 255, 0.1); }
        }

        /* Combine all effects for the discount code */
        .code-animate {
            /* Create the moving shimmer gradient behind the text */
            background: linear-gradient(
                90deg, 
                #a1a1aa 10%, 
                #f4f4f5 30%, 
                #ffffff 50%, 
                #f4f4f5 70%, 
                #a1a1aa 90%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            
            /* Apply the shimmering movement */
            animation: shimmer 5s linear infinite;
        }

        /* Apply glow to the box itself */
        .code-box-animate {
            animation: codeGlow 4s ease-in-out infinite;
        }

        /* Carbon Fiber background pattern from the Coming Soon page */
        .bg-grain {
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 flex items-center justify-center min-h-screen overflow-hidden font-sans">

    <div class="absolute inset-0 bg-grain opacity-20 pointer-events-none"></div>

    <div class="relative z-10 text-center px-6 max-w-2xl">
        
        <div class="mb-8 inline-block">
            <span class="px-4 py-1.5 border border-emerald-800 bg-emerald-950/30 rounded-full text-[11px] uppercase tracking-[0.3em] text-emerald-400 font-bold animate-pulse">
                Order Confirmed
            </span>
        </div>

        <h1 class="text-zinc-100 text-3xl md:text-5xl font-black tracking-tighter uppercase mb-6 leading-tight text-breathe">
            Thank you for <br>
            your <span class="text-zinc-600">purchase</span>.
        </h1>

        <p class="text-zinc-400 text-base md:text-lg font-light leading-relaxed tracking-wide mb-12">
            We are glad you are now part of <br class="md:hidden">
            the <strong class="font-semibold text-zinc-200">Infin8Grips family!</strong>
        </p>

        <p class="text-zinc-500 text-sm font-medium uppercase tracking-widest mb-4">
            Here is a 15% discount on your next purchase:
        </p>

        <div class="inline-block bg-zinc-900 border border-zinc-700/50 px-10 py-5 rounded-2xl code-box-animate">
            <span class="code-animate text-3xl md:text-4xl font-mono font-black tracking-[0.2em]">
                IFIN8FAM26
            </span>
        </div>

        <div class="mt-16 flex justify-center space-x-2">
            <div class="w-16 h-[1px] bg-zinc-800"></div>
            <div class="w-2 h-[1px] bg-zinc-600"></div>
            <div class="w-16 h-[1px] bg-zinc-800"></div>
        </div>

        <div class="mt-12 text-[10px] uppercase tracking-widest text-zinc-700 font-bold">
            Infin8Grips | Los Fresnos, TX
        </div>
    </div>

</body>
</html>
