<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infin8Grips | Custom Shop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous-basic.min.css">
    
    <style>
        .product-item img { transition: transform 0.3s ease; }
        .product-item:hover img { transform: scale(1.02); }
        .lum-lightbox { z-index: 1000; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Infin8Grips</h1>
            <input type="text" id="shop-search" placeholder="Search (1911, snake, etc)..." 
                   class="w-full md:w-64 bg-gray-100 border-none rounded-full py-2 px-5 text-sm focus:ring-2 focus:ring-black outline-none">
        </div>
    </header>

    <main id="product-grid" class="max-w-6xl mx-auto p-6 md:p-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/Luminous.min.js"></script>
    
    <script>
        const products = [
            {
                name: "1911 Custom Grip",
                price: "$85.00",
                description: "Custom one of a kind handmade snake skin appearance unique 1911 grip.",
                images: ["images/snk0.png", "images/snk1.png", "images/snk2.png"],
                squareLink: "https://square.link/u/9tMdnUti"
            },
            {
                name: "Custom Steel Hardware",
                price: "$85.00",
                description: "Heavy-duty custom fabricated hardware. Clean finish and built to last.",
                images: ["images/item2-1.jpg", "images/item2-2.jpg"],
                squareLink: "https://square.link/u/9tMdnUti"
            }
        ];

        let galleryInstance = null;

        function renderShop(filter = "") {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ""; // Clear grid

            products.forEach((item, index) => {
                const searchStr = `${item.name} ${item.description}`.toLowerCase();
                if (filter && !searchStr.includes(filter.toLowerCase())) return;

                const hiddenImages = item.images.slice(1).map(img => `
                    <a href="${img}" class="luminous-gallery hidden" data-gallery="g-${index}"></a>
                `).join('');

                const dots = item.images.length > 1 ? `
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1.5 px-3 py-1.5 bg-black/20 backdrop-blur-md rounded-full">
                        ${item.images.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full ${i === 0 ? 'bg-white' : 'bg-white/40'}"></div>`).join('')}
                    </div>
                ` : '';

                grid.innerHTML += `
                    <div class="product-item bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                        <div class="relative">
                            <a href="${item.images[0]}" class="luminous-gallery" data-gallery="g-${index}">
                                <img src="${item.images[0]}" class="w-full h-80 object-cover cursor-zoom-in">
                            </a>
                            ${dots}
                            ${hiddenImages}
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <h2 class="text-xl font-bold">${item.name}</h2>
                            <p class="text-gray-500 text-sm mt-2 flex-grow">${item.description}</p>
                            <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-between">
                                <span class="text-xl font-black">${item.price}</span>
                                <a href="${item.squareLink}" class="bg-black text-white px-6 py-2.5 rounded-full text-sm font-bold">Buy Now</a>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Re-initialize Lightbox every time we render
            if (galleryInstance) {
                // We don't destroy, just re-bind to new elements
            }
            new LuminousGallery(document.querySelectorAll(".luminous-gallery"), {
                arrowNavigation: true
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            renderShop();

            // Search Listener
            document.getElementById('shop-search').addEventListener('input', (e) => {
                renderShop(e.target.value);
            });
        });
    </script>
</body>
</html>
