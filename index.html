<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFIN8GRIPS | Custom 1911 Grips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover img { transform: scale(1.05); }
        #product-modal { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans selection:bg-black selection:text-white">

    <nav class="p-6 flex justify-between items-center bg-white/90 sticky top-0 z-40 border-b border-gray-100 glass">
        <h1 class="text-xl font-bold tracking-tighter italic">INFIN8GRIPS!</h1>
        <button onclick="toggleCart(true)" class="text-sm font-medium hover:opacity-70 transition flex items-center gap-2">
            Bag (<span id="cart-count">0</span>)
        </button>
    </nav>

    <main id="product-grid" class="max-w-6xl mx-auto p-6 md:p-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">
        </main>

    <div id="product-modal" class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white max-w-4xl w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row" onclick="event.stopPropagation()">
            <div id="modal-img-container" class="md:w-1/2 bg-gray-100 h-64 md:h-auto"></div>
            <div class="p-10 md:w-1/2 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl font-bold mb-2 tracking-tight"></h2>
                <p id="modal-price" class="text-xl text-gray-500 mb-6"></p>
                <p id="modal-desc" class="text-gray-600 leading-relaxed mb-8"></p>
                <button id="add-to-cart-btn" class="bg-black text-white py-4 rounded-full hover:bg-zinc-800 transition shadow-lg font-bold">Add to Bag</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-[60] translate-x-full cart-sidebar flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold">Your Bag</h3>
            <button onclick="toggleCart(false)" class="text-3xl leading-none">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
            </div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between mb-4 font-bold text-lg">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" onclick="checkout()" class="w-full bg-black text-white py-4 rounded-full font-bold hover:bg-zinc-800 transition disabled:opacity-50">
                Checkout via Square
            </button>
        </div>
    </div>

    <script>
        const PRODUCTS = [
            { id: 1, name: "1911 Snake Texture Grip", price: 85, img: "images/snk0.png", desc: "Handmade 1911 grip with deep snake skin texture for maximum control." },
            { id: 2, name: "1911 Classic Grip", price: 120, img: "images/snk1.png", desc: "Premium handmade 1911 grip with refined snake skin finish." },
            { id: 3, name: "1911 Custom Grip", price: 42, img: "images/snk2.png", desc: "Custom crafted 1911 grip featuring unique scale patterns." }
        ];

        let cart = [];

        function init() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = PRODUCTS.map(p => `
                <div class="product-card cursor-pointer group" onclick="openModal(${p.id})">
                    <div class="aspect-[4/5] overflow-hidden rounded-xl bg-gray-200 mb-4 shadow-sm">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700" onerror="this.src='https://via.placeholder.com/400x500?text=Grip+Image'">
                    </div>
                    <div class="flex justify-between items-start px-1">
                        <div>
                            <h3 class="font-bold text-lg tracking-tight">${p.name}</h3>
                            <p class="text-gray-500 font-medium">$${p.price}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = PRODUCTS.find(x => x.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = `$${p.price}`;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-img-container').innerHTML = `<img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Grip+Image'">`;
            document.getElementById('add-to-cart-btn').onclick = () => addToCart(p.id);
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('product-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('product-modal').classList.remove('flex');
        }

        function toggleCart(show) {
            document.getElementById('cart-sidebar').style.transform = show ? 'translateX(0)' : 'translateX(100%)';
        }

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            cart.push({ ...p, cartId: Date.now() });
            updateUI();
            closeModal();
            toggleCart(true);
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center mt-10">Your bag is empty.</p>`;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="flex gap-4 items-center animate-in fade-in slide-in-from-right-4 duration-300">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded shadow-sm">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm leading-tight">${item.name}</h4>
                            <p class="text-xs text-gray-500">$${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-gray-300 hover:text-red-500 transition-colors text-2xl">&times;</button>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        async function checkout() {
            if (cart.length === 0) return alert("Add items first!");
            
            const btn = document.getElementById('checkout-btn');
            const originalText = btn.innerText;
            btn.innerText = "Connecting to Square...";
            btn.disabled = true;

            try {
                // Change this back to the relative path:
const response = await fetch('/api/checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items: cart })
});

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    throw new Error("Missing URL");
                }
            } catch (err) {
                console.error(err);
                alert("Checkout Error: Ensure your Square Keys are set in Vercel.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
