<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Custom Grips & Hardware</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Breathing Animation (Opacity & Scale) */
        @keyframes subtleBreathe {
            0%, 100% { opacity: 0.95; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.03); }
        }

        /* 2. Glow Animation (Outer Shine) */
        @keyframes subtleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.1); }
            50% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 10px rgba(255, 255, 255, 0.2); }
        }

        /* 3. Shimmer Animation (Moving Gradient Shine) */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .advanced-animate {
            /* Combine Breathe & Glow */
            animation: subtleBreathe 4s ease-in-out infinite, subtleGlow 4s ease-in-out infinite;
            
            /* Apply Shimmer as a gradient background clipped to the text */
            background: linear-gradient(
                90deg, 
                #f4f4f5 20%, 
                #a1a1aa 40%, 
                #ffffff 50%, 
                #a1a1aa 60%, 
                #f4f4f5 80%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            
            /* Set the shimmer speed */
            -webkit-animation: shimmer 6s linear infinite, subtleBreathe 4s ease-in-out infinite, subtleGlow 4s ease-in-out infinite;
            animation: shimmer 6s linear infinite, subtleBreathe 4s ease-in-out infinite, subtleGlow 4s ease-in-out infinite;
        }

        .bg-grain {
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 flex items-center justify-center min-h-screen overflow-hidden">

    <div class="absolute inset-0 bg-grain opacity-20 pointer-events-none"></div>

    <div class="relative z-10 text-center px-6">
        
        <div class="mb-6 inline-block">
            <span class="px-3 py-1 border border-zinc-700 rounded-full text-[10px] uppercase tracking-[0.3em] text-zinc-500 font-bold animate-pulse">
                In Development
            </span>
        </div>

        <h1 class="advanced-animate text-5xl md:text-8xl font-black tracking-tighter uppercase mb-4 py-2">
            Coming <span class="opacity-70">Soon</span>
        </h1>

        <p class="max-w-md mx-auto text-zinc-400 text-sm md:text-base font-light leading-relaxed tracking-wide mt-6">
            Custom 1911 gun grips. Precision-engraved hardware. <br>
            Our storefront is under construction.
        </p>

        <div class="mt-12 flex justify-center space-x-2">
            <div class="w-12 h-[1px] bg-zinc-800"></div>
            <div class="w-2 h-[1px] bg-zinc-500"></div>
            <div class="w-12 h-[1px] bg-zinc-800"></div>
        </div>

        <div class="mt-12 text-[10px] uppercase tracking-widest text-zinc-600 font-bold">
            Los Fresnos, TX
        </div>
    </div>

</body>
</html>
