<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom 1911 Grips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="p-6 flex justify-between items-center bg-white/90 sticky top-0 z-40 border-b border-gray-100 glass">
        <h1 class="text-xl font-bold tracking-tighter italic">STUDIO.</h1>
        <button onclick="toggleCart(true)" class="text-sm font-medium hover:opacity-70 transition">
            Bag (<span id="cart-count">0</span>)
        </button>
    </nav>

    <main id="product-grid" class="max-w-6xl mx-auto p-6 md:p-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">
        </main>

    <div id="product-modal" class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center p-4 glass" onclick="closeModal(event)">
        <div class="bg-white max-w-4xl w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row" onclick="event.stopPropagation()">
            <div id="modal-img-container" class="md:w-1/2 bg-gray-100"></div>
            <div class="p-10 md:w-1/2 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl font-light mb-2"></h2>
                <p id="modal-price" class="text-xl text-gray-500 mb-6"></p>
                <p id="modal-desc" class="text-gray-600 leading-relaxed mb-8"></p>
                <button id="add-to-cart-btn" class="bg-black text-white py-4 rounded-full hover:bg-gray-800 transition shadow-lg">Add to Bag</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-[60] translate-x-full cart-sidebar flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold">Your Bag</h3>
            <button onclick="toggleCart(false)" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
            </div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between mb-4 font-bold">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-black text-white py-4 rounded-full font-medium">Checkout via Square</button>
        </div>
    </div>

    <script>
        /** * FUTURE UPDATES: 
         * Just add or remove objects in this array to update your site!
         */
        const PRODUCTS = [
            { id: 1, name: "1911 Snake Texture Grip", price: 85, img: "images/snk0.png?auto=format&fit=crop&w=800", desc: "Handmade 1911 grip with snake skin texture." },
            { id: 2, name: "Pure Linen Throw", price: 120, img: "images/snk1.png?auto=format&fit=crop&w=800", desc: "Handmade 1911 grip with snake skin texture." },
            { id: 3, name: "Obsidian Candle", price: 42, img: "images/snk2.png?auto=format&fit=crop&w=800", desc: "Handmade 1911 grip with snake skin texture." }
        ];

        let cart = [];

        // Initialize Store
        function init() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = PRODUCTS.map(p => `
                <div class="product-card cursor-pointer group" onclick="openModal(${p.id})">
                    <div class="aspect-[4/5] overflow-hidden rounded-xl bg-gray-100 mb-4">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700">
                    </div>
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-medium text-lg">${p.name}</h3>
                            <p class="text-gray-400">$${p.price}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Modal Controls
        function openModal(id) {
            const p = PRODUCTS.find(x => x.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = `$${p.price}`;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-img-container').innerHTML = `<img src="${p.img}" class="w-full h-full object-cover">`;
            document.getElementById('add-to-cart-btn').onclick = () => addToCart(p.id);
            
            const modal = document.getElementById('product-modal');
            modal.classList.remove('hidden');
        }

        function closeModal(e) {
            document.getElementById('product-modal').classList.add('hidden');
        }

        // Cart Logic
        function toggleCart(show) {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.style.transform = show ? 'translateX(0)' : 'translateX(100%)';
        }

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            cart.push({ ...p, cartId: Date.now() }); // Unique ID for removal
            updateUI();
            closeModal();
            toggleCart(true);
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateUI();
        }

        function updateUI() {
            // Update Count
            document.getElementById('cart-count').innerText = cart.length;
            
            // Update Items
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center mt-10">Your bag is empty.</p>`;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="flex gap-4 items-center">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded">
                        <div class="flex-1">
                            <h4 class="font-medium text-sm">${item.name}</h4>
                            <p class="text-xs text-gray-400">$${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-gray-300 hover:text-red-500">&times;</button>
                    </div>
                `).join('');
            }

            // Update Total
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function checkout() {
            if (cart.length === 0) return alert("Add items first!");
            // For GitHub Pages: Redirect to your pre-made Square Online Checkout link
            window.location.href = "https://checkout.square.site/merchant/YOUR_ID/checkout/YOUR_LINK_ID";
        }

        init();
    </script>
</body>
</html>
