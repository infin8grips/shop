<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infin8Grips | Custom 1911 Grips & Hardware</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous-basic.min.css">
    
    <style>
        .product-item img { transition: transform 0.3s ease; }
        .product-item:hover img { transform: scale(1.02); }
        /* Lightbox depth fix for sticky headers */
        .lum-lightbox { z-index: 1000; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans leading-normal tracking-normal">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-6 md:py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter uppercase text-black">Infin8Grips</h1>
            
            <div class="relative w-full md:w-64">
                <input type="text" id="shop-search" placeholder="Search (1911, snake, steel)..." 
                       class="w-full bg-gray-100 border-none rounded-full py-2 px-5 text-sm focus:ring-2 focus:ring-black transition-all">
            </div>
        </div>
    </header>

    <main id="product-grid" class="max-w-6xl mx-auto p-6 md:p-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        </main>

    <footer class="bg-white border-t mt-20">
        <div class="max-w-6xl mx-auto px-6 py-10 text-center text-gray-400 text-xs">
            <p>&copy; 2026 Infin8Grips | Los Fresnos, TX. Secure via Square.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/Luminous.min.js"></script>
    
    <script>
        const products = [
            {
                name: "1911 Custom Grip",
                price: "$85.00",
                description: "Custom one of a kind handmade snake skin appearance unique 1911 grip.",
                images: ["images/snk0.png", "images/snk1.png", "images/snk2.png"],
                squareLink: "https://square.link/u/9tMdnUti"
            },
            {
                name: "Custom Steel Hardware",
                price: "$85.00",
                description: "Heavy-duty custom fabricated hardware. Clean finish and built to last.",
                images: ["images/item2-1.jpg", "images/item2-2.jpg"],
                squareLink: "https://square.link/u/9tMdnUti"
            }
        ];

        function initShop() {
            const grid = document.getElementById('product-grid');
            if (!grid) return;

            products.forEach((item, index) => {
                const hiddenImages = item.images.slice(1).map(img => `
                    <a href="${img}" class="luminous-gallery hidden" data-gallery-id="gal-${index}"></a>
                `).join('');

                const dots = item.images.length > 1 ? `
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1.5 px-3 py-1.5 bg-black/20 backdrop-blur-md rounded-full pointer-events-none">
                        ${item.images.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full ${i === 0 ? 'bg-white' : 'bg-white/40'}"></div>`).join('')}
                    </div>
                ` : '';

                grid.innerHTML += `
                    <div class="product-item bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col" 
                         data-search-text="${item.name.toLowerCase()} ${item.description.toLowerCase()}">
                        <div class="relative group">
                            <a href="${item.images[0]}" class="luminous-gallery" data-gallery-id="gal-${index}">
                                <img src="${item.images[0]}" alt="${item.name}" class="w-full h-80 object-cover cursor-zoom-in">
                            </a>
                            ${dots}
                            ${hiddenImages}
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <h2 class="text-xl font-bold text-gray-900">${item.name}</h2>
                            <p class="text-gray-500 text-sm mt-2 flex-grow">${item.description}</p>
                            <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-between">
                                <span class="text-xl font-black text-gray-900">${item.price}</span>
                                <a href="${item.squareLink}" class="bg-black text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-gray-800 transition">Buy Now</a>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Initialize Lightbox with Loop Navigation
            new LuminousGallery(document.querySelectorAll(".luminous-gallery"), {
                arrowNavigation: true
            });

            // Initialize Live Search Filter
            const searchInput = document.getElementById('shop-search');
            searchInput.addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase().trim();
                const items = document.querySelectorAll('.product-item');
                
                items.forEach(card => {
                    const content = card.getAttribute('data-search-text');
                    card.style.display = content.includes(term) ? 'flex' : 'none';
                });
            });
        }

        // Wait for images and assets to load to avoid script errors
        window.addEventListener('load', initShop);
    </script>
</body>
</html>
