<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infin8Grips</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous-basic.min.css">
    
    <style>
        .product-card img { transition: transform 0.3s ease; }
        .product-card:hover img { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans leading-normal tracking-normal">

    <header class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Custom Shop</h1>
            <nav class="hidden md:block text-sm font-medium text-gray-500 uppercase tracking-widest">
                Items for Sale / Secure via Square
            </nav>
        </div>
    </header>

    <main id="product-grid" class="max-w-6xl mx-auto p-6 md:p-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        </main>

    <footer class="bg-white border-t mt-20">
        <div class="max-w-6xl mx-auto px-6 py-10 text-center text-gray-400 text-xs">
            <p>&copy; 2026 Infin8Grips. All payments processed securely by Square.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/Luminous.min.js"></script>
    
    <script>
        /** * PRODUCT DATA
         * Add your Square links and image paths here.
         * The first image in the array will be the main display photo.
         */
        const products = [
            {
                name: "1911 Custom Grip",
                price: "$85.00",
                description: "Custom one of a kind handmade snake skin appearance unique 1911 grip.",
                images: [
                    "images/snk0.png", 
                    "images/snk1.png", 
                    "images/snk2.png"
                ],
                squareLink: "https://square.link/u/9tMdnUti"
            },
            {
                name: "Custom Steel Hardware",
                price: "$85.00",
                description: "Heavy-duty custom fabricated hardware. Clean finish and built to last.",
                images: [
                    "images/item2-1.jpg", 
                    "images/item2-2.jpg"
                ],
                squareLink: "hhttps://square.link/u/9tMdnUti"
            },
            {
                name: "Specialized Accessory",
                price: "$.00",
                description: "Hand-finished with a minimalist design. Perfect for everyday professional use.",
                images: [
                    "images/item3-1.jpg"
                ],
                squareLink: "https://square.link/u/9tMdnUti"
            }
        ];

        // RENDER LOGIC
        const grid = document.getElementById('product-grid');

        products.forEach((item, index) => {
            // 1. Create hidden links for the lightbox gallery
            const hiddenImages = item.images.slice(1).map(img => `
                <a href="${img}" class="luminous-gallery hidden" data-gallery-id="gallery-${index}"></a>
            `).join('');

            // 2. Create the dots for the bottom of the image
            const dots = item.images.length > 1 ? `
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1.5 px-3 py-1.5 bg-black/20 backdrop-blur-md rounded-full pointer-events-none">
                    ${item.images.map((_, i) => `
                        <div class="w-1.5 h-1.5 rounded-full ${i === 0 ? 'bg-white' : 'bg-white/40'}"></div>
                    `).join('')}
                </div>
            ` : '';

            const card = `
                <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                    <div class="relative group">
                        <a href="${item.images[0]}" class="luminous-gallery" data-gallery-id="gallery-${index}">
                            <img src="${item.images[0]}" alt="${item.name}" class="w-full h-80 object-cover cursor-zoom-in">
                        </a>
                        
                        ${dots}

                        ${hiddenImages}

                        ${item.images.length > 1 ? `
                            <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-1 rounded-md pointer-events-none">
                                ${item.images.length} PHOTOS
                            </div>
                        ` : ''}
                    </div>

                    <div class="p-6 flex-grow flex flex-col">
                        <h2 class="text-xl font-bold text-gray-900">${item.name}</h2>
                        <p class="text-gray-500 text-sm mt-2 flex-grow">${item.description}</p>
                        
                        <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-between">
                            <span class="text-xl font-black text-gray-900">${item.price}</span>
                            <a href="${item.squareLink}" class="bg-black text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-gray-800 transition shadow-lg shadow-black/10">
                                Buy Now
                            </a>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });

        // Initialize Lightbox
        new LuminousGallery(document.querySelectorAll(".luminous-gallery"));

    </script>
</body>
</html>
